<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PWC</title>

    <!-- stylesheet -->
    <link href="./css/cartoon.css" rel="stylesheet" />
    <link href="../../static/css/style.css" rel="stylesheet" />
    <!-- javascript -->

      <!-- Bootstrap 5 -->
      <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
      <!-- Bootstrap Icons -->
      <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  </head>

  <body class="bg">
    <!--navbar-->
    <div class = "navbar">
      <div class = "container-fluid">
        <a class = "navbar-brand" href="#">
          🍢 Street Bites
        </a>
      </div>
    </div>

    <!--main content -->
    <main id = "mainContent">
      <!--welcome bar -->
      <div id = "welcome">
        <span class = "welcome-icon">🗺️</span>
        <h2>World Street Food</h2>
        <p>pick a cuisine from the menu to discover its story, flavors, and fun facts.</p>
      </div>

      <!--foodCard-->
      <div class = "foodCard">
        <div class = "food-hero-card">
          <!--image food-->
          <div class="hero-img-wrap">
            <img id="foodImg" src="" alt="" />
            <div class="img-overlay"></div>
            <div class="country-badge" id="countryBadge"></div>
            <div class="dish-emoji"    id="dishEmoji"></div>
          </div>
          <!--food body-->
          <div class = "foodBody">
            <p class = "food-origin" id = "foodOrigin"></p>
            <h2 class = "food-title" id = "foodTitle"></h2>
            <p class = "food-desc" id = "foodDesc"></p>
            <!--fun fact-->
            <div class = "fun-fact-box">
              <span class = "fact-icon">💡</span>
              <div>
                <span class = "fact-lable">Fun Fact</span>
                <p id = "foodFact"></p>
              </div>
            </div>

            <div class="d-flex align-items-center gap-3 flex-wrap">
              <button id="speakBtn" onclick="toggleSpeak()">
                <i class="bi bi-volume-up-fill"></i> Hear the Story
              </button>
              <span class="audio-hint">Reads description &amp; fun fact aloud</span>
            </div>
          </div>
        </div>
      </div>
    </main>


    <!--script-->
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script></script>
  </body>
</html>
