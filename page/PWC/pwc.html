<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>World Street Food</title>

    <!-- PWA Meta Tags -->
    <link rel="manifest" href="./manifest.json" />
    <meta name="theme-color" content="#f5a800" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/192/1046/1046788.png" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

    <!-- Stylesheets -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="./css/pwc.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  </head>

  <body class="bg">
    <div id="offlineBanner">You are currently offline. Some features may be limited.</div>

    <header>
      <a href="#" class="logo">
        <span>🍢</span> Street Bites
      </a>
      <div style="display: flex; gap: 10px; align-items: center;">
        <button id="installBtn">
          <i class="bi bi-download"></i> Install App
        </button>
        <button id="menuToggle">
          <i class="bi bi-list"></i>
        </button>
      </div>
    </header>

    <div class="app-body">
      <aside id="sidebar">
        <div class="sidebar-label">Explore Cuisines</div>
        <div style="padding: 0 0.75rem 0.75rem;">
          <button id="addFoodBtn" class="btn btn-sm w-100 shadow-sm" style="background: var(--brand); color: var(--ink); font-weight: 600; border-radius: 8px; border: none; padding: 8px;" data-bs-toggle="modal" data-bs-target="#addFoodModal">
            <i class="bi bi-plus-circle"></i> Add My Food
          </button>
        </div>
        <input type="text" id="searchBox" placeholder="Search by food or country..." oninput="filterMenu(this.value)" />
        <ul id="menuList">
          <!-- Dynamic menu items will be injected here -->
        </ul>
      </aside>

      <main id="mainContent">
        <!-- Welcome Screen -->
        <div id="welcome">
          <span class="welcome-icon">🗺️</span>
          <h2>World Street Food</h2>
          <p>Pick a cuisine from the menu to discover its story, flavors, and fun facts.</p>
        </div>

        <!-- Food Card -->
        <div id="foodCard">
          <div class="food-hero-card">
            <div class="hero-img-wrap">
              <img id="foodImg" src="" alt="" />
              <div class="img-overlay"></div>
              <div class="country-badge" id="countryBadge"></div>
              <div class="dish-emoji" id="dishEmoji"></div>
            </div>

            <div class="food-body">
              <p class="food-origin" id="foodOrigin"></p>
              <h2 class="food-title" id="foodTitle"></h2>
              <p class="food-desc" id="foodDesc"></p>

              <div class="fun-fact-box">
                <span class="fact-icon">💡</span>
                <div>
                  <span class="fact-label">Fun Fact</span>
                  <p id="foodFact"></p>
                </div>
              </div>

              <div class="audio-row">
                <button id="speakBtn" onclick="toggleSpeak()">
                  <i class="bi bi-volume-up-fill"></i> Hear the Story
                </button>
                <span class="audio-hint">Reads description &amp; fun fact aloud</span>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <!-- Add Food Modal -->
    <div class="modal fade" id="addFoodModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="background: var(--surface); border: 1px solid var(--border); border-radius: 14px;">
          <div class="modal-header" style="border-bottom: 1px solid var(--border);">
            <h5 class="modal-title" style="font-family: 'Playfair Display', serif; color: var(--ink);">Add New Street Food</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <form id="addFoodForm">
              <div class="mb-3">
                <label class="form-label small fw-bold" style="color: var(--muted);">FOOD NAME</label>
                <input type="text" class="form-control" id="newTitle" required placeholder="e.g. Churros" style="border-radius: 8px; border: 1px solid var(--border);">
              </div>
              <div class="mb-3">
                <label class="form-label small fw-bold" style="color: var(--muted);">COUNTRY</label>
                <input type="text" class="form-control" id="newCountry" required placeholder="e.g. Spain" style="border-radius: 8px; border: 1px solid var(--border);">
              </div>
              <div class="mb-3">
                <label class="form-label small fw-bold" style="color: var(--muted);">DESCRIPTION</label>
                <textarea class="form-control" id="newDesc" rows="2" required placeholder="Describe the flavors..." style="border-radius: 8px; border: 1px solid var(--border);"></textarea>
              </div>
              <div class="mb-3">
                <label class="form-label small fw-bold" style="color: var(--muted);">FUN FACT</label>
                <input type="text" class="form-control" id="newFact" required placeholder="Something cool about it..." style="border-radius: 8px; border: 1px solid var(--border);">
              </div>
              <div class="row">
                <div class="col-6">
                  <div class="mb-3">
                    <label class="form-label small fw-bold" style="color: var(--muted);">FOOD EMOJI</label>
                    <input type="text" class="form-control" id="newEmoji" required placeholder="🍩" style="border-radius: 8px; border: 1px solid var(--border);">
                  </div>
                </div>
                <div class="col-6">
                  <div class="mb-3">
                    <label class="form-label small fw-bold" style="color: var(--muted);">FLAG</label>
                    <input type="text" class="form-control" id="newFlag" required placeholder="🇪🇸" style="border-radius: 8px; border: 1px solid var(--border);">
                  </div>
                </div>
              </div>
              <div class="mb-3">
                <label class="form-label small fw-bold" style="color: var(--muted);">IMAGE URL (OPTIONAL)</label>
                <input type="url" class="form-control" id="newImg" placeholder="https://images.unsplash.com/..." style="border-radius: 8px; border: 1px solid var(--border);">
              </div>
              <button type="submit" class="btn w-100" style="background: var(--brand); color: var(--ink); font-weight: 700; border-radius: 8px; padding: 10px;">Save to Menu</button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/pwc.js"></script>
  </body>
</html>
